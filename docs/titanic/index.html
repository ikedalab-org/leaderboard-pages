<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="refresh" content="60">
  <title>Titanic リーダーボード</title>
<style>
  .container { max-width: 480px; width: 860px; margin: 24px auto; font-family: system-ui, -apple-system, sans-serif; }
  @media (max-width: 900px) { .container { width: 96%; max-width: 860px; } }
  h1 { margin: 0 0 12px; }
  .meta { color: #666; margin-bottom: 16px; }

  table { border-collapse: collapse; width: 100%; table-layout: fixed; }
  col.rank  { width: 60px;  }
  col.star  { width: 36px;  }
  col.nick  { width: 200px; }   /* ← 表示名の幅。必要なら調整 */
  col.score { width: 120px; }
  col.ts    { width: 180px; }
  col.src   { width: 220px; }

  th, td { border-bottom: 1px solid #ddd; padding: 8px 10px; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  th { background: #fafafa; }
  .right { text-align: right; font-variant-numeric: tabular-nums; }
  .center { text-align: center; }
</style>
</head>
<body>
  <div class="container">
    <h1>Titanic リーダーボード</h1>
    <div class="meta">エントリー数: 0 / 更新: 2026-05-04 09:01:02</div>
    <table>

      <colgroup>
        <col class="rank"><col class="star"><col class="nick">
        <col class="score"><col class="score"><col class="ts">
      </colgroup>
      <thead>
        <tr>

          <th style="width: 42px;">#</th>
          <th style="width: 36px;">★</th>
          <th>表示名</th>
          <th class="right">申告スコア</th>
          <th class="right">評価スコア</th>
          <th class="center">提出時刻</th>
        </tr>
      </thead>
      <tbody>

      </tbody>
    </table>
  </div>
</body>
</html>
