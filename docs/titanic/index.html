<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Titanic リーダーボード</title>
<style>
  .container { max-width: 480px; width: 860px; margin: 24px auto; font-family: system-ui, -apple-system, sans-serif; }
  @media (max-width: 900px) { .container { width: 96%; max-width: 860px; } }
  h1 { margin: 0 0 12px; }
  .meta { color: #666; margin-bottom: 16px; }

  table { border-collapse: collapse; width: 100%; table-layout: fixed; }
  col.rank  { width: 60px;  }
  col.star  { width: 36px;  }
  col.nick  { width: 160px; }  /* ← 名前の列幅を広めに（必要なら 280 などに） */
  col.score { width: 120px; }
  col.ts    { width: 180px; }
  col.src   { width: 220px; }

  th, td { border-bottom: 1px solid #ddd; padding: 8px 10px; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  th { background: #fafafa; }
  .right { text-align: right; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="container">
    <h1>Titanic リーダーボード</h1>
    <div class="meta">エントリー数: 2 / 更新: 2025-12-04 13:44:37</div>
    <table>

      <colgroup>
        <col class="rank"><col class="star"><col class="nick"><col class="score"><col class="ts">
      </colgroup>
      <thead>
        <tr>

          <th style="width: 42px;">#</th>
          <th style="width: 36px;">★</th>
          <th>表示名</th>
          <th>スコア</th>
          <th>提出時刻</th>
    
        </tr>
      </thead>
      <tbody>
  <tr>
    <td>1</td>
    <td>★</td>
    <td title="23610239">23610239</td>
    <td class="right">0.874</td>
    <td>2025-11-26 09:38</td>
  </tr>
  <tr>
    <td>2</td>
    <td>★</td>
    <td title="NGUYEN KIM HOANG">NGUYEN KIM HOANG</td>
    <td class="right">0.811</td>
    <td>2025-10-10 14:04</td>
  </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
